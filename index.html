<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <title>LexArena – prototyp</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="brand">
    <span class="logo-dot"></span>
    <span>LexArena</span>
  </div>
</header>

<main class="container">

  <div class="left">
    <div class="card">
      <h3>Oblasti</h3>
      <div class="small">Vyber oblasť</div>
      <div id="facultyList" class="list"></div>
    </div>

    <div class="card">
      <h3>Moje appky</h3>
      <div class="small">Rýchly prístup k tvojim projektom</div>
      <div id="appsList" class="list"></div>
    </div>

    <div class="card">
      <h3>Hry pripravené na výzvu</h3>
      <div class="small">Balíky otázok uložené zo študijných appiek</div>
      <div id="duelPackagesList" class="list"></div>
    </div>
  </div>

  <div class="right">
    <div class="card" id="quizCard">
      <h3>Kvíz</h3>
      <div id="quizIntro">
        <p>Vyber oblasť</p>
      </div>
      <div id="quizArea" style="display:none"></div>
    </div>
  </div>

</main>

<!-- jediný externý modul -->
<script type="module" src="data.js"></script>

<!-- inicializácia LexAreny -->
<script type="module">
  import { inicializovatUI } from "./lexarena/ui.js";
  import { initArena } from "./lexarena/arena.js";

  inicializovatUI();
  initArena();
</script>

</body>
</html>
