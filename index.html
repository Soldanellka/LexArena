<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <title>DUEL Pracovné právo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- Elegantná ochranná známka LuluLaw -->
  <style>
    .lululaw-mark {
      position: fixed;
      right: 20px;
      bottom: 16px;
      z-index: 9999;

      font-family: "Great Vibes", cursive;
      font-size: 26px;
      font-weight: 400;

      color: rgba(0, 0, 0, 0.22);
      pointer-events: none;
      user-select: none;

      animation: lululaw-breathe 6s ease-in-out infinite;
    }

    body.dark .lululaw-mark {
      color: rgba(255, 255, 255, 0.32);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.12);
    }

    @keyframes lululaw-breathe {
      0%, 100% { opacity: 0.22; transform: translateY(0); }
      50% { opacity: 0.40; transform: translateY(-1px); }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="logo">
      <span class="logo-badge">§</span>
      <span class="logo-text">DUEL Pracovné právo</span>
    </div>
    <div class="header-right">
     
      <button id="themeToggle" class="theme-toggle" aria-label="Prepínač témy">🌙</button>
    </div>
  </header>

  <main class="app-main">
<a href="https://lex-arena-seven.vercel.app" class="back-to-lex">← Späť do LexAreny</a>

    <section class="intro">
      <h1>Vyber si okruh</h1>
      <p>Prejdi minikvíz, dlaždice a prípady. Potom môžeš vyzvať kamaráta na duel a získať § na avatary.</p>
    </section>

    <section class="topics-grid" id="topicsGrid">
      <!-- Karty sa generujú dynamicky zo súborov data/A1.json … A30.json -->
    </section>

    <section class="duel-result hidden" id="duelResult">
      <h1>Výhra v dueli! 🎉</h1>
      <p>Získavaš +10 § za výhru. Navštív obchod a kúp si avatar.</p>
      <button id="playAgain" class="primary-btn click-anim">Ďalší duel</button>
    </section>
  </main>

  <!-- Elegantná ochranná známka vpravo dole -->
  <div class="lululaw-mark">LuluLaw</div>

  <!-- Externá knižnica konfiet -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Lokálne skripty v správnom poradí -->
  <script src="js/utils.js"></script>
  <script src="js/generators.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/cases.js"></script>
  <script src="js/duel.js"></script>
  <script src="js/topics.ui.js"></script>
  <script src="js/topics.sequence.js"></script>
  <!-- <script src="js/topics.js"></script> -->
  <script src="js/app.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof window.appInit === 'function') {
        window.appInit();
      } else {
        console.warn('appInit nie je dostupné. Skontroluj, či sa js/app.js načítal správne.');
      }
    });
  </script>
</body>
</html>
