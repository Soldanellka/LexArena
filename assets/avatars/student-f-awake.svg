<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
<defs>
  <radialGradient id="skinF" cx="45%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#fde8d0"/>
    <stop offset="100%" stop-color="#f0b88a"/>
  </radialGradient>
  <radialGradient id="hairF" cx="50%" cy="10%" r="75%">
    <stop offset="0%" stop-color="#7a4a20"/>
    <stop offset="100%" stop-color="#3a1a05"/>
  </radialGradient>
  <radialGradient id="irisF" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#c87830"/>
    <stop offset="100%" stop-color="#6a3010"/>
  </radialGradient>
  <linearGradient id="suiteF" x1="0%" y1="0%" x2="10%" y2="100%">
    <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="100%" stop-color="#0d0d18"/>
  </linearGradient>
  <radialGradient id="cheekF" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffb0b0" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#ff8888" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow3d">
    <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.25)"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- TELO -->
<ellipse cx="120" cy="240" rx="65" ry="60" fill="url(#suiteF)" filter="url(#shadow3d)"/>
