<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
<defs>
  <radialGradient id="skinFS" cx="45%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#fde0c5"/>
    <stop offset="100%" stop-color="#e8a878"/>
  </radialGradient>
  <radialGradient id="hairFS" cx="50%" cy="10%" r="75%">
    <stop offset="0%" stop-color="#7a4a20"/>
    <stop offset="100%" stop-color="#3a1a05"/>
  </radialGradient>
  <linearGradient id="suiteFS" x1="0%" y1="0%" x2="10%" y2="100%">
    <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="100%" stop-color="#0d0d18"/>
  </linearGradient>
  <radialGradient id="cheekFS" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffb0a0" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#ff8888" stop-opacity="0"/>
  </radialGradient>
  <filter id="shFS">
    <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.25)"/>
  </filter>
  <filter id="dreamFS">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- TELO (mierne nakloné) -->
<g transform="rotate(10, 120, 220)">
